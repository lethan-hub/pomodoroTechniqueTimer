<button id="start-btn">Start</button>
<button id="reset-btn">Reset</button> 
        <script>

               

                async function Duration(){
                const response = await fetch('/api/timer/status');
                const data = await response.json();

                console.log(data.seconds);
                secondsRemaining = data.seconds;
                
                let secs = secondsRemaining % 60;
            let mins = Math.floor(secondsRemaining / 60);
            let formattedSecs = secs < 10 ? "0" + secs : secs;

            document.getElementById('sub-headline').innerText = data.phase;
            
            display.innerText = mins + ":" + formattedSecs;
            

            
        }

         function manualJump(phaseName){
                clearInterval(timerRunning);
                timerRunning = null;

                document.getElementById('start-btn').innerText = "Start";
                        fetch('/jump/' + phaseName)
        .then(() => {
            // 2. Once the jump is finished, update the screen
            // Use the function you already have that fetches the status
            Duration()(); 
        });
                }
        
        
       
	// JavaScript File for the Time

        // variable to hold the seconds

        let secondsRemaining = 0;

        // A function that runs every 1 second

	const myButton = document.getElementById('start-btn');
        const display = document.getElementById('timer-display');
        const myButton2 = document.getElementById('reset-btn')
        let timerRunning = null;

        
        myButton2.addEventListener('click',function(){
                clearInterval(timerRunning);
                timerRunning = null;
                
                display.innerText = "25:00"
                secondsRemaining = 1500;
                myButton.innerText = "Start";


                


        });
        
        // This tells what the button to do whenever clicked
        myButton.addEventListener('click', function() {

    if (timerRunning !== null) {
        // STOP LOGIC
        clearInterval(timerRunning);
        timerRunning = null;
        myButton.innerText = "Start";
        return; // Exit the function here so we don't start a new timer!
    } else {
        // START LOGIC
        myButton.innerText = "Stop";
        
        timerRunning = setInterval(() => {
            secondsRemaining--; 
            
            let secs = secondsRemaining % 60;
            let mins = Math.floor(secondsRemaining / 60);
            let formattedSecs = secs < 10 ? "0" + secs : secs;
            
            display.innerText = mins + ":" + formattedSecs;

            if (secondsRemaining <= 0) {
                clearInterval(timerRunning);
                fetch('/next').then(()=> {
                                console.log("Server updated! Now getting the new time...");
                                Duration();
                        })
                timerRunning = null;
                myButton.innerText = "Start";
                alert("Time is up!");
            }
        }, 1000); // This closes the setInterval
    } // This closes the 'else'
}); // This closes the addEventListener


     
        
        
        Duration();
	
	</script>
